{% macro password_input(name, value='', id=None, required=False, label='Пароль') %}
<div class="form-group" {% if id %}id="{{ id }}"{% endif %}>
    <label>{{ label }}</label>
    <div>
        <i class="fas fa-lock"></i>
        <input
            type="password"
            name="{{ name }}"
            value="{{ value }}"
            placeholder="Пароль пользователя"
            autocomplete="off"
            {% if required %}required{% endif %}
        />
        <i class="fas fa-eye toggle-password"></i>
    </div>
</div>
{% endmacro %}
