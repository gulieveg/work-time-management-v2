{% macro toggle_switch(name, checked=False, id=None, data_attrs={}) %}
<label class="switch">
    <input type="checkbox" name="{{ name }}" {% if id %}id="{{ id }}" {% endif %}autocomplete="off"{% if checked %} checked{% endif %}{% for key, val in data_attrs.items() %} data-{{ key }}="{{ val }}"{% endfor %}>
    <span class="slider"></span>
</label>
{% endmacro %}
